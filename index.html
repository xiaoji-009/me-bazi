<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八字AI分析 - GitHub Pages版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .form-section {
            padding: 40px 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-section {
            padding: 30px;
            background: #f8f9fa;
            border-top: 2px solid #e2e8f0;
            display: none;
        }
        
        .result-section.show {
            display: block;
        }
        
        .result-content {
            background: white;
            padding: 25px;
            border-radius: 10px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .result-header h2 {
            color: #667eea;
            font-size: 24px;
        }
        
        .btn-secondary {
            padding: 8px 16px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #c33;
        }
        
        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #3c3;
            margin-bottom: 20px;
        }
        
        .info {
            background: #e3f2fd;
            color: #1976d2;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #1976d2;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔮 八字AI分析</h1>
            <p>传统智慧与现代AI的完美结合 | GitHub Pages版</p>
        </div>
        
        <div class="form-section">
            <div class="info">
                ℹ️ <strong>GitHub Pages版本说明：</strong><br>
                由于GitHub Pages不支持服务器端代理，本版本使用公共CORS代理服务。<br>
                如需更稳定的体验，建议部署到Vercel。
            </div>
            
            <form id="baziForm">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="name" placeholder="请输入您的姓名" value="张三">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>性别</label>
                        <select id="gender">
                            <option value="male">男</option>
                            <option value="female">女</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>出生日期</label>
                        <input type="date" id="birthDate" value="1990-05-15">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>出生时间</label>
                        <input type="time" id="birthTime" value="10:30">
                    </div>
                    
                    <div class="form-group">
                        <label>出生地点</label>
                        <input type="text" id="birthPlace" placeholder="如：北京" value="北京">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>自定义问题（可选）</label>
                    <textarea id="customPrompt" placeholder="例如：请重点分析我的事业运势和财运"></textarea>
                </div>
                
                <button type="button" class="btn" id="analyzeBtn" onclick="analyzeBazi()">
                    🚀 开始AI分析
                </button>
            </form>
        </div>
        
        <div class="result-section" id="resultSection">
            <div class="result-header">
                <h2>📊 分析报告</h2>
                <button class="btn-secondary" onclick="copyResult()">📋 复制报告</button>
            </div>
            <div id="result"></div>
        </div>
    </div>

    <script>
        // 防抖函数，避免重复提交
        let isAnalyzing = false;
        
        // 使用多个CORS代理备选
        const CORS_PROXIES = [
            'https://anynetgate.cn/',
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            ''  // 最后尝试直接访问
        ];
        const API_BASE = 'https://baziapi.site';
        
        // 八字API类 - GitHub Pages版（使用CORS代理）
        class BaziAPI {
            constructor() {
                this.baseURL = API_BASE;
                this.currentProxyIndex = 0;
            }
            
            getCurrentProxy() {
                return CORS_PROXIES[this.currentProxyIndex];
            }
            
            switchProxy() {
                this.currentProxyIndex = (this.currentProxyIndex + 1) % CORS_PROXIES.length;
                console.log(`切换到代理 ${this.currentProxyIndex + 1}/${CORS_PROXIES.length}`);
            }
            
            // 提交任务
            async submit(birthData) {
                const url = `${this.baseURL}/api/bazi/submit`;
                const proxy = this.getCurrentProxy();
                const proxyUrl = proxy ? `${proxy}${encodeURIComponent(url)}` : url;
                
                try {
                    const res = await fetch(proxyUrl, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify(birthData)
                    });
                    
                    if (!res.ok) {
                        throw new Error(`提交失败: HTTP ${res.status}`);
                    }
                    
                    const result = await res.json();
                    return result.taskId;
                } catch (error) {
                    // 如果当前代理失败，尝试下一个
                    if (this.currentProxyIndex < CORS_PROXIES.length - 1) {
                        console.log(`代理失败，尝试下一个...`);
                        this.switchProxy();
                        return this.submit(birthData);
                    }
                    throw error;
                }
            }
            
            // 查询结果
            async getResult(taskId) {
                const url = `${this.baseURL}/api/bazi/result/${taskId}`;
                const proxy = this.getCurrentProxy();
                const proxyUrl = proxy ? `${proxy}${encodeURIComponent(url)}` : url;
                
                const res = await fetch(proxyUrl);
                
                if (!res.ok) {
                    throw new Error(`查询失败: HTTP ${res.status}`);
                }
                
                return await res.json();
            }
            
            // 一键分析（自动轮询）
            async analyze(birthData, onProgress) {
                const taskId = await this.submit(birthData);
                
                // 最多轮询90次，每次间隔3秒（总共4.5分钟）
                for (let i = 0; i < 90; i++) {
                    try {
                        const result = await this.getResult(taskId);
                        
                        // 通知进度
                        if (onProgress) {
                            onProgress(i + 1, 90, result.status);
                        }
                        
                        if (result.status === 'completed') {
                            return result.data;
                        } else if (result.status === 'failed') {
                            throw new Error(result.error || '分析失败');
                        }
                    } catch (error) {
                        // 如果查询失败，继续重试
                        console.log(`查询失败，继续重试... (${i + 1}/90)`);
                        if (onProgress) {
                            onProgress(i + 1, 90, 'retrying');
                        }
                    }
                    
                    // 等待3秒后继续查询
                    await new Promise(r => setTimeout(r, 3000));
                }
                
                throw new Error('分析超时，请稍后重试');
            }
        }
        
        const api = new BaziAPI();
        
        async function analyzeBazi() {
            // 防止重复提交
            if (isAnalyzing) {
                alert('正在分析中，请稍候...');
                return;
            }
            
            const btn = document.getElementById('analyzeBtn');
            const resultSection = document.getElementById('resultSection');
            const resultDiv = document.getElementById('result');
            
            // 获取表单数据
            const name = document.getElementById('name').value || '测试用户';
            const gender = document.getElementById('gender').value;
            const birthDate = document.getElementById('birthDate').value;
            const birthTime = document.getElementById('birthTime').value;
            const birthPlace = document.getElementById('birthPlace').value || '北京';
            const customPrompt = document.getElementById('customPrompt').value;
            
            // 验证必填字段
            if (!birthDate || !birthTime) {
                alert('❌ 请填写出生日期和时间');
                return;
            }
            
            // 转换日期时间
            const date = new Date(birthDate);
            const [hour, minute] = birthTime.split(':').map(Number);
            
            // 验证日期有效性
            if (isNaN(date.getTime())) {
                alert('❌ 请输入有效的出生日期');
                return;
            }
            
            // 构建请求数据
            const requestData = {
                year: date.getFullYear(),
                month: date.getMonth() + 1,
                day: date.getDate(),
                hour: hour,
                minute: minute || 0,
                gender: gender
            };
            
            console.log('📤 发送请求:', requestData);
            
            // 设置分析状态
            isAnalyzing = true;
            btn.disabled = true;
            btn.textContent = '⏳ AI分析中，请稍候...';
            resultSection.classList.add('show');
            resultDiv.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p style="font-size: 18px; font-weight: 600; color: #667eea;">AI正在深度分析您的八字...</p>
                    <p style="font-size: 14px; color: #666; margin-top: 10px;">⏱️ 预计需要 60-120 秒</p>
                    <p id="progressText" style="font-size: 12px; color: #999; margin-top: 5px;">正在提交任务...</p>
                    <p style="font-size: 11px; color: #999; margin-top: 10px;">💡 提示：GitHub Pages版本使用公共代理，速度较慢，请耐心等待</p>
                </div>
            `;
            
            try {
                // 使用异步模式分析，带进度回调
                const result = await api.analyze(requestData, (current, total, status) => {
                    const progressText = document.getElementById('progressText');
                    if (progressText) {
                        const percent = Math.round((current / total) * 100);
                        const statusText = status === 'retrying' ? '重试中' : status;
                        progressText.textContent = `正在查询结果... (${current}/${total}) - ${percent}% - 状态: ${statusText}`;
                    }
                });
                
                // 显示成功结果
                const userInfo = `
                    <div class="success">
                        <strong>✅ 分析完成</strong><br>
                        👤 ${name} | ${gender === 'male' ? '男' : '女'} | 
                        📅 ${birthDate} ${birthTime} | 
                        📍 ${birthPlace}
                        ${customPrompt ? '<br>📝 自定义问题: ' + customPrompt : ''}
                    </div>
                `;
                
                // 格式化显示分析结果
                const formattedData = result.replace(/\n/g, '<br>');
                
                resultDiv.innerHTML = userInfo + `
                    <div class="result-content">${formattedData}</div>
                `;
                
                console.log('✅ 分析结果已显示');
                
            } catch (error) {
                console.error('❌ 请求失败:', error);
                
                let errorMsg = error.message;
                let suggestion = '';
                
                // 根据错误类型提供不同的提示
                if (error.message.includes('超时')) {
                    suggestion = `
                        <br><br><strong>可能原因：</strong><br>
                        1. 服务器响应时间过长<br>
                        2. 网络连接不稳定<br>
                        3. 服务器正在处理大量请求<br><br>
                        <strong>建议：</strong>请稍后重试
                    `;
                } else if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    errorMsg = '无法连接到服务器';
                    suggestion = `
                        <br><br><strong>可能原因：</strong><br>
                        1. 网络连接问题<br>
                        2. CORS代理服务暂时不可用<br>
                        3. API服务器暂时不可用<br><br>
                        <strong>建议：</strong>稍后重试，或部署到Vercel获得更稳定的体验
                    `;
                } else if (error.message.includes('HTTP')) {
                    suggestion = `
                        <br><br><strong>服务器返回错误</strong><br>
                        请检查请求参数是否正确
                    `;
                }
                
                resultDiv.innerHTML = `
                    <div class="error">
                        <strong>❌ 分析失败</strong><br>
                        ${errorMsg}
                        ${suggestion}
                    </div>
                `;
            } finally {
                // 恢复按钮状态
                isAnalyzing = false;
                btn.disabled = false;
                btn.textContent = '🚀 开始AI分析';
            }
        }
        
        function copyResult() {
            const resultContent = document.querySelector('.result-content');
            if (resultContent) {
                const text = resultContent.textContent;
                navigator.clipboard.writeText(text).then(() => {
                    alert('✅ 报告已复制到剪贴板');
                }).catch(err => {
                    console.error('复制失败:', err);
                    alert('❌ 复制失败，请手动复制');
                });
            }
        }
        
        // 回车键提交
        document.getElementById('baziForm').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault();
                analyzeBazi();
            }
        });
    </script>
</body>
</html>
